name: Build APK

on:
  push:
    branches: [ main, 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      # Release build signed with the stable keystore committed in the repo.
      # (Debug builds on CI were signed with the runner's EPHEMERAL debug key —
      # every build had a different signature, so updates failed on the phone.)
      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: cp app/build/outputs/apk/release/app-release.apk smsiq.apk

      # Publish the "latest" release ONLY from main — branch builds must never
      # overwrite the APK that phones download.
      - name: Delete old release
        if: github.ref == 'refs/heads/main'
        run: gh release delete latest --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        run: |
          gh release create latest \
            --title "SMSIQ — latest" \
            --notes "Najnowsza wersja bramki SMS IQ Group. Instaluj ręcznie (sideload) na telefonie-bramce." \
            smsiq.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: smsiq-release
          path: smsiq.apk
          retention-days: 30
